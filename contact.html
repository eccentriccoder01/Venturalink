<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    radial-gradient(800px 500px at 10% 20%, rgba(99,102,241,0.25), transparent),
    radial-gradient(800px 500px at 90% 80%, rgba(6,182,212,0.2), transparent),
    linear-gradient(135deg,#0f172a,#111827 70%);
  color:#e5e7eb;
}

/* ================= WRAPPER ================= */

.wrapper{
  width:1200px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:50px;
}

/* ================= CARD ================= */

.card{
  position:relative;
  background:rgba(30,41,59,0.8);
  backdrop-filter:blur(20px);
  border-radius:24px;
  padding:50px 45px;
  box-shadow:
      0 25px 60px rgba(0,0,0,0.6),
      inset 0 0 0 1px rgba(255,255,255,0.05);
  overflow:hidden;
  transition:all 0.4s ease;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:
      0 35px 80px rgba(0,0,0,0.8),
      0 0 40px rgba(99,102,241,0.4);
}

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:60px;
  border-radius:20px 20px 0 0;
  background:linear-gradient(90deg,#36aeea,#7b6ffb);
}

.card h2{
  position:relative;
  margin:0 0 50px 0;
  text-align:center;
  font-weight:700;
  font-size:20px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}

/* ================= LEFT GRID ================= */

.info-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:60px 70px;
  text-align:center;
}

.info-item{
  transition:all 0.3s ease;
  padding:15px;
  border-radius:16px;
}

.info-item:hover{
  background:rgba(99,102,241,0.15);
  transform:translateY(-6px);
  box-shadow:0 0 25px rgba(99,102,241,0.4);
}

.info-item strong{
  display:block;
  margin-top:15px;
  font-size:18px;
  font-weight:600;
  color:white;
}

.info-item span{
  display:block;
  margin-top:6px;
  font-size:14px;
  opacity:0.85;
}

.glow{
  background:rgba(6,182,212,0.15);
  box-shadow:
      0 0 50px rgba(6,182,212,0.5),
      0 0 120px rgba(6,182,212,0.2);
}

/* ================= FORM ================= */

.form-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-bottom:20px;
}

input, textarea{
  width:100%;
  padding:15px 18px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.05);
  background:rgba(51,65,85,0.7);
  color:white;
  font-size:14px;
  transition:all 0.3s ease;
}

textarea{
  height:130px;
  resize:none;
  margin-bottom:25px;
}

input:focus,
textarea:focus{
  outline:none;
  border:1px solid #06b6d4;
  box-shadow:
      0 0 0 2px rgba(6,182,212,0.4),
      0 0 25px rgba(6,182,212,0.5);
  background:rgba(30,41,59,0.9);
}

/* ================= BUTTON ================= */

.submit-btn{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:none;
  background:linear-gradient(90deg,#6366f1,#06b6d4);
  color:white;
  font-weight:600;
  font-size:15px;
  cursor:pointer;
  transition:all 0.4s ease;
}

.submit-btn:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 45px rgba(6,182,212,0.6);
}

/* ================= MODAL ================= */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(5px);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.active{
  display:flex;
}

.modal-box{
  background:#1e293b;
  padding:35px 30px;
  border-radius:18px;
  width:320px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,0.7);
  animation:popup 0.3s ease;
}

@keyframes popup{
  from{transform:scale(0.8);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

.modal-box h3{
  margin-bottom:10px;
  color:#06b6d4;
}

.modal-box p{
  font-size:14px;
  margin-bottom:20px;
}

.modal-box button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#6366f1,#06b6d4);
  color:white;
  cursor:pointer;
}

/* ================= RESPONSIVE ================= */

@media(max-width:900px){
  .wrapper{
    grid-template-columns:1fr;
    width:90%;
  }
}

</style>
</head>

<body>

<div class="wrapper">

  <!-- LEFT CARD -->
  <div class="card">
    <h2>Get In Touch With Us Now!</h2>
    <div class="info-grid">
      <div class="info-item">
        📞
        <strong>Phone</strong>
        <span>+91 98765 43210</span>
      </div>
      <div class="info-item">
        ✉️
        <strong>Email</strong>
        <span>support@venturalink.com</span>
      </div>
      <div class="info-item">
        📍
        <strong>Location</strong>
        <span>Bengaluru, India</span>
      </div>
      <div class="info-item glow">
        🕒
        <strong>Hours</strong>
        <span>09:00 AM - 06:00 PM</span>
      </div>
    </div>
  </div>

  <!-- RIGHT CARD -->
  <div class="card">
    <h2>Contact Us</h2>

    <form id="contactForm">
      <div class="form-row">
        <input type="text" placeholder="First Name *" required>
        <input type="text" placeholder="Last Name">
      </div>
      <div class="form-row">
        <input type="text" placeholder="Mobile No *" required>
        <input type="email" placeholder="Email ID *" required>
      </div>
      <textarea placeholder="Message" required></textarea>
      <button type="submit" class="submit-btn">Submit ➜</button>
    </form>
  </div>

</div>

<!-- POPUP MODAL -->
<div class="modal" id="successModal">
  <div class="modal-box">
    <h3>Thank You!</h3>
    <p>Our team will connect with you as soon as possible.</p>
    <button onclick="closeModal()">OK</button>
  </div>
</div>

<script>
const form = document.getElementById("contactForm");
const modal = document.getElementById("successModal");

form.addEventListener("submit", function(e){
  e.preventDefault();
  modal.classList.add("active");
  form.reset();
});

function closeModal(){
  modal.classList.remove("active");
}
</script>

</body>
</html>
